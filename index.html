<!DOCTYPE html>
<!-- Menentukan tipe dokumen HTML5 -->

<html>
<!-- Tag utama pembungkus seluruh halaman HTML -->

<head>
    <!-- Berisi metadata (informasi tentang halaman) -->

    <title>Tugas HTML</title>
    <!-- Judul yang muncul di tab browser -->
</head>

<body>
    <!-- Semua isi yang tampil di website -->

    <h1>Belajar HTML</h1>
    <!-- Tag heading (judul utama) -->

    <p>Ini adalah contoh paragraf dalam HTML.</p>
    <!-- Tag paragraf -->

    <a href="https://google.com">Kunjungi Google</a>
    <!-- Tag link untuk berpindah ke halaman lain -->

    <br>
    <!-- Tag untuk pindah baris -->

    <img src="https://via.placeholder.com/150" alt="Contoh Gambar">
    <!-- Tag untuk menampilkan gambar, dan alt sebagai respon jika gamabar tidak tersedia -->

    <h1>Daftar Buah:</h1>
    <!-- Tag sebagai header/judul, h1-h6 semakin besar angkanya semakin kecil fontnya -->

    <ul>
        <!-- Tag untuk membuat list tidak berurutan -->
        <li>Apel</li>
        <!-- Item dalam list -->
        <li>Pisang</li>
        <li>Mangga</li>
        <li>durian</li>
    </ul>

    <div>
        <!-- Tag pembungkus / container, digunakan untuk mengelompokkan elemen lain dalam satu bagian.-->
        <p>Ini isi dalam div.</p>
    </div>

    <hr>
    <!-- Garis horizontal -->

    <b>Teks Tebal</b>
    <!-- Membuat teks menjadi tebal(bold) -->

</body>

</html>
